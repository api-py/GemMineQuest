name: GemMineQuest
options:
  bundleIdPrefix: com.gemmine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  GemMineQuest:
    type: application
    platform: iOS
    sources:
      - path: GemMineQuest
        excludes:
          - "**/*.json"
    resources:
      - path: GemMineQuest/Resources
      - path: GemMineQuest/Assets.xcassets
    scheme:
      testTargets:
        - GemMineQuestTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gemmine.quest
        PRODUCT_NAME: GemMineQuest
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "GemMine Quest"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.puzzle-games"

  GemMineQuestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GemMineQuestTests
    dependencies:
      - target: GemMineQuest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gemmine.quest.tests
        GENERATE_INFOPLIST_FILE: true
